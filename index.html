<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA PREMIUM - 8A7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #fcfcfc; color: #334155; }
        .glass-card { background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        
        /* GIAO DIỆN CHUẨN MENU */
        .link-style { font-weight: bold; text-decoration: underline; cursor: pointer; font-style: italic; text-transform: uppercase; }
        
        /* DÒNG CHỮ XANH LÁ THẦN THÁNH */
        #status-msg { 
            font-weight: bold; 
            font-size: 15px; 
            color: #16a34a; /* Màu xanh lá chuẩn */
            margin-top: 15px;
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        input, textarea { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; outline: none; width: 100%; }
        .btn-save { background-color: #7c2d12; color: white; font-weight: bold; padding: 16px; border-radius: 15px; width: 100%; text-transform: uppercase; }
        .opt-btn { border: 2px solid #f1f5f9; width: 100%; text-align: left; padding: 16px; border-radius: 18px; font-weight: 600; margin-bottom: 12px; cursor: pointer; font-style: italic; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="mainMenu" class="glass-card p-12 w-full max-w-lg mt-20 text-center">
        <p class="text-gray-300 text-[10px] font-bold uppercase tracking-[0.3em] mb-10">LỰA CHỌN CHỨC NĂNG</p>
        <div class="flex flex-col items-center space-y-8">
            <div onclick="showSection('adminPage')" class="link-style text-lg text-orange-500">
                📝 QUẢN LÝ ĐỀ THI (ADMIN)
            </div>
            <div onclick="showSection('selectExamPage')" class="link-style text-xl text-[#8b5cf6]">
                ✍️ VÀO THI NGAY (AUTO XÁO)
            </div>
        </div>
    </div>

    <div id="adminPage" class="glass-card p-8 w-full max-w-2xl hidden mt-4">
        <div onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-6 cursor-pointer text-sm italic">← Quay lại Menu</div>
        <h2 class="text-xl font-bold mb-4 border-l-4 border-orange-600 pl-3">Trình tạo đề thi</h2>
        
        <input type="text" id="examTitle" placeholder="Nhập tên đề thi..." class="mb-4 bg-gray-50">
        <textarea id="rawInput" class="h-64 mb-4 font-mono text-sm bg-gray-50" placeholder="Câu 1: Câu hỏi?&#10;A. Đáp án 1&#10;B. Đáp án đúng @t"></textarea>
        
        <button onclick="saveExam()" class="btn-save">LƯU ĐỀ VÀO MÁY</button>
        
        <div id="status-msg"></div>

        <div class="mt-10">
            <p class="text-gray-400 font-bold text-[10px] uppercase mb-4 tracking-widest">DANH SÁCH ĐỀ ĐÃ TẠO</p>
            <div id="adminExamList" class="space-y-3"></div>
        </div>
    </div>

    <div id="selectExamPage" class="glass-card p-10 w-full max-w-lg hidden mt-4 text-center">
        <div onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-8 cursor-pointer text-sm italic">← Quay lại</div>
        <div id="userExamList" class="flex flex-col space-y-6"></div>
    </div>

    <script>
        let allExams = JSON.parse(localStorage.getItem('g_exams')) || [];

        function showSection(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'adminPage') renderAdmin();
            if(id === 'selectExamPage') renderUserExams();
        }

        function saveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            
            if(!title || !text) return;

            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return {
                    qText: lines[0].trim(),
                    opts: lines.slice(1).map(l => ({
                        text: l.replace('@t', '').trim().substring(2).trim(),
                        isCorrect: l.includes('@t')
                    }))
                };
            });

            allExams.unshift({ id: Date.now(), title, questions });
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            
            // HIỆN DÒNG CHỮ XANH GIỐNG ẢNH CỦA ÔNG
            const msgEl = document.getElementById('status-msg');
            msgEl.innerHTML = `✅ Đã thêm đề: ${title} (${questions.length} câu)`;
            
            // Xóa chữ sau 3 giây
            setTimeout(() => { msgEl.innerHTML = ""; }, 3000);
            
            document.getElementById('examTitle').value = "";
            document.getElementById('rawInput').value = "";
            renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('adminExamList').innerHTML = allExams.map(ex => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl">
                    <span class="font-bold italic uppercase text-xs">${ex.title}</span>
                    <button onclick="deleteExam(${ex.id})" class="text-red-500 font-bold text-[10px]">XÓA</button>
                </div>
            `).join('');
        }

        function deleteExam(id) {
            allExams = allExams.filter(e => e.id !== id);
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            renderAdmin();
            document.getElementById('status-msg').innerHTML = `<span style="color: #ef4444">🗑️ Đã xóa đề thi</span>`;
            setTimeout(() => { document.getElementById('status-msg').innerHTML = ""; }, 2000);
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = allExams.map(ex => `
                <div class="link-style text-lg text-[#8b5cf6]" onclick="alert('Bắt đầu làm bài!')">${ex.title}</div>
            `).join('') || 'Chưa có đề nào';
        }
    </script>
</body>
</html>
