<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; color: #334155; }
        .glass-card { background: white; border-radius: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        /* STYLE MENU MỚI THEO ẢNH */
        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            border-radius: 25px;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        
        /* Nút Cam (Admin) */
        .btn-orange {
            background: linear-gradient(90deg, #f59e0b, #d97706);
            color: white;
        }
        
        /* Nút Trắng (Vào thi & Kết quả) */
        .btn-white {
            background: white;
            border-color: #f1f5f9;
        }
        .btn-white:hover { background-color: #fafafa; }

        /* ICON & TEXT */
        .btn-title { font-weight: 800; font-size: 1.2rem; text-transform: uppercase; }
        .btn-subtitle { font-size: 0.75rem; opacity: 0.8; font-weight: 500; }
        
        #status-msg { 
            font-weight: bold; 
            font-size: 15px; 
            color: #16a34a; 
            margin-top: 15px;
            min-height: 24px;
            text-align: center;
        }

        input, textarea { border-radius: 15px !important; border: 1.5px solid #e2e8f0 !important; padding: 12px 18px !important; outline: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <!-- NAVBAR CHUẨN V3.0 -->
    <nav id="navbar" class="w-full bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center mb-10">
        <div class="text-2xl font-black italic text-purple-700 tracking-tighter">GAYZOTA <span class="text-xs font-normal text-gray-400">V3.0</span></div>
        <button id="logoutBtn" onclick="location.reload()" class="hidden text-xs font-bold text-gray-400 hover:text-red-500 uppercase">Đăng xuất</button>
    </nav>

    <!-- 1. LOGIN -->
    <div id="loginPage" class="glass-card p-10 w-full max-w-sm text-center">
        <h2 class="text-3xl font-black mb-10 text-purple-700 uppercase italic">GAYZOTA</h2>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full bg-gray-50">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full bg-gray-50">
            <button onclick="handleLogin()" class="w-full bg-purple-600 text-white font-bold py-4 rounded-2xl shadow-lg mt-4 uppercase">Đăng nhập</button>
        </div>
    </div>

    <!-- 2. BẢNG ĐIỀU KHIỂN (MAIN MENU) -->
    <div id="mainMenu" class="glass-card p-10 w-full max-w-2xl hidden">
        <p class="text-center text-gray-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-8">Bảng điều khiển</p>
        
        <!-- QUẢN LÝ ĐỀ THI -->
        <div onclick="showSection('adminPage')" class="menu-btn btn-orange shadow-lg shadow-orange-200">
            <div>
                <div class="btn-title">📄 Quản lý đề thi</div>
                <div class="btn-subtitle">Dành riêng cho MrDuc - Tạo, sửa, xóa đề</div>
            </div>
            <div class="text-2xl">➔</div>
        </div>

        <!-- VÀO THI NGAY -->
        <div onclick="showSection('selectExamPage')" class="menu-btn btn-white shadow-sm border-purple-50">
            <div>
                <div class="btn-title text-purple-600">✍️ Vào thi ngay</div>
                <div class="btn-subtitle text-gray-400">Làm bài tập Địa lý, Lịch sử...</div>
            </div>
            <div class="text-2xl text-purple-600">➔</div>
        </div>

        <!-- KẾT QUẢ LỚP -->
        <div onclick="showSection('resultBoard')" class="menu-btn btn-white shadow-sm">
            <div>
                <div class="btn-title text-gray-700">📊 Kết quả lớp</div>
                <div class="btn-subtitle text-gray-400">Xem bảng điểm và IP người làm</div>
            </div>
            <div class="text-2xl text-gray-400">➔</div>
        </div>
    </div>

    <!-- 3. ADMIN PAGE -->
    <div id="adminPage" class="glass-card p-8 w-full max-w-3xl hidden">
        <div onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-6 cursor-pointer text-xs uppercase italic">← Quay lại</div>
        <h2 class="text-xl font-black mb-6 uppercase">Trình quản lý đề</h2>
        
        <input type="text" id="examTitle" placeholder="Tên đề thi" class="w-full mb-4">
        <textarea id="rawInput" class="w-full h-64 mb-4 font-mono text-sm" placeholder="Câu 1: Câu hỏi...&#10;A. Đáp án&#10;B. Đáp án đúng @t"></textarea>
        
        <button onclick="saveExam()" class="w-full bg-gray-800 text-white font-bold py-4 rounded-2xl uppercase">Lưu đề thi</button>
        <div id="status-msg"></div>

        <div id="adminExamList" class="mt-8 space-y-2"></div>
    </div>

    <!-- 4. CHỌN ĐỀ -->
    <div id="selectExamPage" class="glass-card p-10 w-full max-w-lg hidden text-center">
        <div onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-8 cursor-pointer text-xs uppercase">← Quay lại</div>
        <div id="userExamList" class="space-y-4"></div>
    </div>

    <!-- 5. LÀM BÀI -->
    <div id="examView" class="w-full max-w-2xl hidden">
        <div class="glass-card p-6 mb-4 flex justify-between items-center">
            <span id="qIdx" class="font-black text-purple-600 uppercase text-xs">CÂU 1</span>
            <div id="timer" class="text-xl font-bold text-red-500 bg-red-50 px-4 py-1 rounded-full">15:00</div>
        </div>
        <div class="glass-card p-10">
            <h3 id="qText" class="text-xl font-bold mb-10 italic"></h3>
            <div id="optionsArea"></div>
        </div>
    </div>

    <!-- 6. KẾT QUẢ & BẢNG ĐIỂM -->
    <div id="resultBoard" class="glass-card p-8 w-full max-w-2xl hidden">
        <div onclick="showSection('mainMenu')" class="text-purple-600 font-bold mb-8 cursor-pointer text-xs uppercase">← Quay lại</div>
        <h3 class="font-black mb-6 uppercase italic underline">Bảng điểm lớp 8A7</h3>
        <table class="w-full text-left text-sm"><tbody id="resultTableBody"></tbody></table>
    </div>

    <script>
        const USERS = { 'mrduc': 'admin8a7', '8a7': '8a7' };
        let allExams = JSON.parse(localStorage.getItem('g_exams')) || [];
        let history = JSON.parse(localStorage.getItem('g_history')) || [];
        let state = { user: '', currentIdx: 0, corrects: 0, timerInterval: null };

        function showSection(id) {
            document.querySelectorAll('body > div:not(nav)').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'adminPage') renderAdmin();
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'resultBoard') renderHistory();
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if(USERS[u] === p) {
                state.user = u;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                showSection('mainMenu');
            }
        }

        function saveExam() {
            const title = document.getElementById('examTitle').value;
            const text = document.getElementById('rawInput').value;
            if(!title || !text) return;

            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                return { qText: lines[0].trim(), opts: lines.slice(1).map(l => ({ text: l.replace('@t', '').trim().substring(2).trim(), isCorrect: l.includes('@t') })) };
            });

            allExams.unshift({ id: Date.now(), title, questions });
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            
            const msg = document.getElementById('status-msg');
            msg.innerHTML = `✅ Đã thêm đề: ${title} (${questions.length} câu)`;
            setTimeout(() => { msg.innerHTML = ""; }, 3000);
            
            document.getElementById('examTitle').value = ""; document.getElementById('rawInput').value = "";
            renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('adminExamList').innerHTML = allExams.map(ex => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl italic border">
                    <span class="font-bold text-gray-600 uppercase text-xs">${ex.title}</span>
                    <button onclick="deleteExam(${ex.id})" class="text-red-400 font-black text-[10px] uppercase">Xóa</button>
                </div>
            `).join('');
        }

        function deleteExam(id) {
            allExams = allExams.filter(e => e.id !== id);
            localStorage.setItem('g_exams', JSON.stringify(allExams));
            renderAdmin();
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = allExams.map(ex => `
                <div class="p-5 bg-white border-2 border-purple-50 rounded-2xl font-bold text-purple-600 cursor-pointer hover:bg-purple-50" onclick="startExam(${ex.id})">${ex.title}</div>
            `).join('') || 'Chưa có đề';
        }

        function startExam(id) {
            const exam = allExams.find(e => e.id === id);
            state.currentExam = exam; state.currentIdx = 0; state.corrects = 0;
            state.shuffledQs = [...exam.questions].sort(() => Math.random() - 0.5);
            showSection('examView'); loadQuestion(); startTimer(15 * 60);
        }

        function startTimer(sec) {
            clearInterval(state.timerInterval);
            let t = sec;
            state.timerInterval = setInterval(() => {
                let m = Math.floor(t / 60), s = t % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (--t < 0) { clearInterval(state.timerInterval); finishExam(); }
            }, 1000);
        }

        function loadQuestion() {
            const q = state.shuffledQs[state.currentIdx];
            document.getElementById('qIdx').innerText = `CÂU ${state.currentIdx + 1}`;
            document.getElementById('qText').innerText = q.qText;
            const area = document.getElementById('optionsArea'); area.innerHTML = '';
            
            [...q.opts].sort(() => Math.random() - 0.5).forEach(opt => {
                const b = document.createElement('div');
                b.className = 'opt-btn shadow-sm'; b.innerText = opt.text;
                b.onclick = function() {
                    if(area.style.pointerEvents === 'none') return;
                    area.style.pointerEvents = 'none';
                    this.style.borderColor = opt.isCorrect ? '#22c55e' : '#ef4444';
                    if(opt.isCorrect) state.corrects++;
                    setTimeout(() => {
                        state.currentIdx++; area.style.pointerEvents = 'auto';
                        if(state.currentIdx < state.shuffledQs.length) loadQuestion();
                        else finishExam();
                    }, 500);
                };
                area.appendChild(b);
            });
        }

        function finishExam() {
            clearInterval(state.timerInterval);
            const score = ((state.corrects / state.shuffledQs.length) * 10).toFixed(1);
            history.unshift({ name: state.user.toUpperCase(), score, time: new Date().toLocaleTimeString() });
            localStorage.setItem('g_history', JSON.stringify(history));
            alert("Điểm của bạn: " + score);
            showSection('mainMenu');
        }

        function renderHistory() {
            document.getElementById('resultTableBody').innerHTML = history.map(h => `
                <tr class="border-b"><td class="py-4 font-bold uppercase text-xs">${h.name}</td><td class="text-center font-black text-purple-600">${h.score}</td></tr>
            `).join('');
        }
    </script>
</body>
</html>
