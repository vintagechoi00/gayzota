<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA BY ME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f5f3ff; }
        .glass-card { background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(139, 92, 246, 0.1); }
        .azota-purple { color: #8b5cf6; }
        .bg-azota { background-color: #8b5cf6; }
        .review-opt { border: 2px solid #f3f4f6; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
        .review-correct { border-color: #22c55e !important; background-color: #f0fdf4; }
        .review-wrong { border-color: #ef4444 !important; background-color: #fef2f2; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav id="navbar" class="hidden bg-white shadow-sm p-4 flex justify-between items-center px-6 border-b">
        <div class="font-bold azota-purple text-lg italic underline uppercase">GAYZOTA BY ME</div>
        <button onclick="location.reload()" class="bg-red-50 text-red-500 text-xs font-bold px-4 py-2 rounded-xl">THOÁT</button>
    </nav>

    <main class="flex-grow p-4 flex flex-col items-center justify-start">
        
        <!-- TRANG ĐĂNG NHẬP -->
        <div id="loginPage" class="glass-card p-8 w-full max-w-md mt-10 text-center">
            <h2 class="text-3xl font-black mb-6 azota-purple uppercase">GAYZOTA</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full p-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-200">
                <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-200">
                <button onclick="handleLogin()" class="w-full bg-azota text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform">ĐĂNG NHẬP</button>
            </div>
        </div>

        <!-- MENU CHÍNH -->
        <div id="mainMenu" class="glass-card p-8 w-full max-w-2xl hidden mt-6">
            <h2 class="text-xl font-bold mb-6 azota-purple border-b pb-2 text-center uppercase">Bảng Điều Khiển</h2>
            <div class="grid grid-cols-1 gap-4">
                <button id="adminOnlyBtn" onclick="showSection('adminPage')" class="hidden p-5 border-2 border-violet-100 rounded-2xl hover:bg-violet-50 text-left font-bold italic text-violet-600">📝 Quản lý đề thi (Admin)</button>
                <button onclick="showSection('selectExamPage')" class="p-5 border-2 border-violet-100 rounded-2xl hover:bg-violet-50 text-left font-bold uppercase text-gray-700">✍️ Vào thi</button>
                <button onclick="showSection('resultBoard')" class="p-5 border-2 border-violet-100 rounded-2xl hover:bg-violet-50 text-left font-bold uppercase text-gray-700">📊 Xem kết quả</button>
            </div>
        </div>

        <!-- TRANG QUẢN LÝ (ADMIN) -->
        <div id="adminPage" class="glass-card p-8 w-full max-w-4xl hidden mt-4">
            <button onclick="showSection('mainMenu')" class="mb-4 text-violet-600 font-bold text-sm underline">← Quay lại Menu</button>
            <h3 id="formTitle" class="font-bold mb-2 text-gray-600 uppercase">Tạo/Sửa đề thi</h3>
            <input type="text" id="examTitle" placeholder="Tên đề thi" class="w-full p-3 rounded-xl border mb-4 focus:ring-2 focus:ring-violet-200 outline-none">
            <textarea id="rawInput" class="w-full h-48 p-3 rounded-xl border mb-4 focus:outline-none focus:ring-2 focus:ring-violet-200" placeholder="Câu 1. Nội dung... A. ĐA1 B. ĐA2 @t"></textarea>
            <div class="flex gap-2 mb-6">
                <button id="saveBtn" onclick="saveExamAction()" class="flex-1 bg-azota text-white py-4 rounded-xl font-bold shadow-md">LƯU ĐỀ THI</button>
                <button onclick="resetAdminForm()" class="px-6 bg-gray-100 text-gray-500 rounded-xl font-bold">HỦY</button>
            </div>
            <div id="adminExamListContent" class="mt-4"></div>
        </div>

        <!-- CÁC PHẦN KHÁC GIỮ NGUYÊN ... -->
        <div id="selectExamPage" class="glass-card p-8 w-full max-w-2xl hidden mt-4">
             <button onclick="showSection('mainMenu')" class="mb-4 text-violet-600 font-bold text-sm underline">← Quay lại</button>
             <div id="userExamList" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="examPage" class="glass-card p-8 w-full max-w-2xl hidden">
            <div class="flex justify-between mb-6 border-b pb-4">
                <div id="qNum" class="azota-purple font-bold"></div>
                <div id="timerDisplay" class="text-red-500 font-mono font-bold">15:00</div>
            </div>
            <h3 id="qText" class="text-xl mb-8 font-semibold text-gray-800"></h3>
            <div id="optionsGroup" class="space-y-3"></div>
            <button id="nextBtn" onclick="nextQuestion()" class="mt-8 w-full bg-azota text-white py-4 rounded-xl font-bold hidden uppercase">Tiếp theo</button>
        </div>

        <div id="resultPage" class="glass-card p-10 text-center hidden mt-10 w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Kết quả của bạn</h2>
            <div class="text-8xl font-black azota-purple mb-4" id="finalScore">0</div>
            <div class="mb-6">
                <p class="text-xl font-bold text-gray-700" id="statCorrect">Đúng: 0/0 câu</p>
                <p class="text-gray-400 text-sm" id="statTime">Thời gian làm: 0 phút 0 giây</p>
            </div>
            <hr class="mb-6 border-gray-100">
            <div id="insultText" class="text-xl font-bold italic mb-10 text-gray-700"></div>
            <button onclick="showReview()" class="w-full bg-[#f3e8ff] text-violet-700 font-bold py-4 rounded-2xl mb-4 text-lg">XEM CHI TIẾT ĐÁP ÁN</button>
            <button onclick="showSection('mainMenu')" class="w-full bg-azota text-white font-bold py-4 rounded-2xl shadow-lg text-lg">QUAY LẠI MENU</button>
        </div>

        <div id="reviewPage" class="glass-card p-8 w-full max-w-3xl hidden mt-4">
            <div id="reviewContainer" class="space-y-6"></div>
            <button onclick="showSection('resultPage')" class="mt-10 w-full bg-gray-800 text-white py-4 rounded-xl font-bold uppercase">Quay lại kết quả</button>
        </div>

        <div id="resultBoard" class="glass-card p-8 w-full max-w-3xl hidden mt-4">
            <button onclick="showSection('mainMenu')" class="mb-4 text-violet-600 font-bold text-sm underline">← Quay lại</button>
            <div class="overflow-x-auto"><table class="w-full text-left border-collapse"><tbody id="resultTableBody"></tbody></table></div>
        </div>
    </main>

    <script>
        const USERS = { 'mrduc': { pass: 'admin8a7', role: 'admin' }, 'hoanggay': { pass: 'missgay', role: 'user' } };
        
        const sampleExams = [
            {
                id: 1001,
                title: "KIỂM TRA 15 PHÚT MẪU",
                questions: [
                    { q: "1 + 1 bằng mấy?", opts: [{text:"1",correct:false}, {text:"2",correct:true}, {text:"3",correct:false}] },
                    { q: "Thủ đô của Việt Nam là gì?", opts: [{text:"TP.HCM",correct:false}, {text:"Đà Nẵng",correct:false}, {text:"Hà Nội",correct:true}] }
                ]
            }
        ];

        let allExams = JSON.parse(localStorage.getItem('allExams')) || sampleExams;
        let history = JSON.parse(localStorage.getItem('quizHistory')) || [];
        let state = { user: '', role: '', currentExam: null, editingId: null, idx: 0, correctCount: 0, userAnswers: [], shuffledOptions: [], startTime: 0, timer: null, timeLeft: 900 };

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) { return 'Không rõ'; }
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if (USERS[u] && USERS[u].pass === p) {
                state.user = u; state.role = USERS[u].role;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('navbar').classList.remove('hidden');
                if (state.role === 'admin') document.getElementById('adminOnlyBtn').classList.remove('hidden');
                showSection('mainMenu');
            } else { alert("Sai thông tin!"); }
        }

        // HÀM CHUYỂN TRANG QUAN TRỌNG NHẤT
        function showSection(id) {
            const sections = ['mainMenu', 'adminPage', 'resultBoard', 'examPage', 'resultPage', 'loginPage', 'reviewPage', 'selectExamPage'];
            sections.forEach(s => {
                const el = document.getElementById(s);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'resultBoard') showResultBoardContent();
            if(id === 'adminPage') renderAdminExams();
        }

        function saveExamAction() {
            const title = document.getElementById('examTitle').value.trim();
            const text = document.getElementById('rawInput').value;
            if (!title || !text) return;
            const blocks = text.split(/Câu\s*\d+[:.]/g).filter(b => b.trim().length > 5);
            const questions = blocks.map(b => {
                const lines = b.trim().split('\n');
                const q = lines[0].trim();
                const opts = lines.slice(1).filter(l => l.match(/^[ABCD][.:]/)).map(o => ({
                    text: o.replace(/^[ABCD][.:]/, '').replace('@t', '').trim(),
                    correct: o.includes('@t')
                }));
                return { q, opts };
            });
            if (state.editingId) {
                const index = allExams.findIndex(ex => ex.id === state.editingId);
                allExams[index] = { ...allExams[index], title, questions };
            } else {
                allExams.push({ id: Date.now(), title, questions });
            }
            localStorage.setItem('allExams', JSON.stringify(allExams));
            resetAdminForm();
            renderAdminExams();
        }

        function renderAdminExams() {
            document.getElementById('adminExamListContent').innerHTML = allExams.map(ex => `
                <div class="flex justify-between items-center p-4 border rounded-2xl bg-white mb-2 cursor-pointer" onclick="editExam(${ex.id})">
                    <span class="font-bold text-gray-700">${ex.title}</span>
                    <button onclick="event.stopPropagation(); deleteExam(${ex.id})" class="text-red-400 font-bold text-xs uppercase">Xóa</button>
                </div>`).join('');
        }

        function editExam(id) {
            const exam = allExams.find(ex => ex.id === id);
            state.editingId = id;
            document.getElementById('formTitle').innerText = "Sửa: " + exam.title;
            document.getElementById('examTitle').value = exam.title;
            document.getElementById('rawInput').value = exam.questions.map((q, i) => `Câu ${i+1}. ${q.q}\n` + q.opts.map((o, index) => `${String.fromCharCode(65+index)}. ${o.text} ${o.correct ? '@t' : ''}`).join('\n')).join('\n\n');
            document.getElementById('saveBtn').innerText = "CẬP NHẬT ĐỀ";
        }

        function resetAdminForm() {
            state.editingId = null;
            document.getElementById('formTitle').innerText = "Tạo đề mới";
            document.getElementById('examTitle').value = ""; document.getElementById('rawInput').value = "";
            document.getElementById('saveBtn').innerText = "LƯU ĐỀ THI";
        }

        function deleteExam(id) { if(confirm("Xóa?")) { allExams = allExams.filter(e => e.id !== id); localStorage.setItem('allExams', JSON.stringify(allExams)); renderAdminExams(); } }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = allExams.map(ex => `<button onclick="state.currentExam=allExams.find(e=>e.id==${ex.id});startExam()" class="p-6 border-2 border-violet-100 rounded-3xl font-bold text-violet-700 uppercase shadow-sm active:scale-95 transition-all">${ex.title}</button>`).join('');
        }

        function startExam() {
            showSection('examPage');
            state.idx = 0; state.correctCount = 0; state.userAnswers = []; state.shuffledOptions = []; state.timeLeft = 900;
            state.startTime = Date.now();
            showQ();
            if(state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.timeLeft--;
                const min = Math.floor(state.timeLeft/60), sec = state.timeLeft%60;
                document.getElementById('timerDisplay').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
                if(state.timeLeft <= 0) finishExam();
            }, 1000);
        }

        function showQ() {
            const q = state.currentExam.questions[state.idx];
            document.getElementById('qNum').innerText = `CÂU ${state.idx + 1}/${state.currentExam.questions.length}`;
            document.getElementById('qText').innerText = q.q;
            document.getElementById('nextBtn').classList.add('hidden');
            const group = document.getElementById('optionsGroup'); group.innerHTML = '';
            const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
            state.shuffledOptions.push(shuffled);
            shuffled.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-4 border-2 border-gray-100 rounded-2xl font-medium transition-all";
                b.innerText = o.text;
                b.onclick = () => {
                    if (!document.getElementById('nextBtn').classList.contains('hidden')) return;
                    state.userAnswers.push(i);
                    if (o.correct) { b.classList.add('bg-green-500', 'text-white', 'border-green-500'); state.correctCount++; }
                    else b.classList.add('bg-red-500', 'text-white', 'border-red-500');
                    document.getElementById('nextBtn').classList.remove('hidden');
                };
                group.appendChild(b);
            });
        }

        function nextQuestion() { state.idx++; if (state.idx < state.currentExam.questions.length) showQ(); else finishExam(); }

        async function finishExam() {
            clearInterval(state.timer);
            const userIP = await getIP();
            const duration = Math.floor((Date.now() - state.startTime) / 1000);
            const score = Math.round((state.correctCount / state.currentExam.questions.length) * 10 * 100) / 100;
            const min = Math.floor(duration/60), sec = duration%60;
            const timeStr = `${min} phút ${sec} giây`;
            
            history.unshift({ examTitle: state.currentExam.title, name: state.user, score, time: timeStr, ip: userIP });
            localStorage.setItem('quizHistory', JSON.stringify(history));

            const scriptURL = "https://script.google.com/macros/s/AKfycbw3fT7tR8qnbFOgmfLftZ5--ZvAij5f6RdVvtCq2Q0yBNHrz4_aCuXO5tlSAFR5XYSG/exec"; 
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: state.user, exam: state.currentExam.title, score: score, time: timeStr, ip: userIP })
            });
            
            showSection('resultPage');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('statCorrect').innerText = `Đúng: ${state.correctCount}/${state.currentExam.questions.length} câu`;
            document.getElementById('statTime').innerText = `Thời gian làm: ${timeStr}`;
            document.getElementById('insultText').innerText = score === 10 ? "cheater😡" : score >= 5 ? "Cố gắng tí nữa! 🤪" : "ăn chi ngu rứa🤓";
        }

        function showReview() {
            showSection('reviewPage');
            document.getElementById('reviewContainer').innerHTML = state.currentExam.questions.map((q, i) => {
                const userIdx = state.userAnswers[i], opts = state.shuffledOptions[i];
                return `<div class="p-5 border rounded-2xl bg-white mb-4"><div class="font-bold mb-3">Câu ${i+1}: ${q.q}</div>
                    ${opts.map((o, oi) => {
                        let cls = (oi === userIdx) ? (o.correct ? 'review-correct' : 'review-wrong') : '';
                        return `<div class="review-opt ${cls}">${o.text} ${o.correct ? '✓' : ''}</div>`;
                    }).join('')}</div>`;
            }).join('');
        }

        function showResultBoardContent() {
            document.getElementById('resultTableBody').innerHTML = history.map(h => `<tr class="border-b"><td class="p-3 text-xs font-bold text-gray-400">${h.examTitle}</td><td class="p-3 text-sm font-medium text-gray-800">${h.name}</td><td class="p-3 text-sm font-black text-violet-600 text-right">${h.score}đ</td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center text-gray-400 italic text-sm">Chưa có ai làm bài...</td></tr>';
        }
    </script>
</body>
</html>
