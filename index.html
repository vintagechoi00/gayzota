<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAYZOTA ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f5f3ff; }
        .glass-card { background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(139, 92, 246, 0.1); }
        .azota-purple { color: #8b5cf6; }
        .bg-azota { background-color: #8b5cf6; }
        .review-opt { border: 2px solid #f3f4f6; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
        .review-correct { border-color: #22c55e !important; background-color: #f0fdf4; }
        .review-wrong { border-color: #ef4444 !important; background-color: #fef2f2; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav id="navbar" class="hidden bg-white shadow-sm p-4 flex justify-between items-center px-6 border-b">
        <div class="font-bold azota-purple text-lg italic underline uppercase">GAYZOTA ULTIMATE</div>
        <button onclick="location.reload()" class="bg-red-50 text-red-500 text-xs font-bold px-4 py-2 rounded-xl">THOÁT</button>
    </nav>

    <main class="flex-grow p-4 flex flex-col items-center justify-start">
        <!-- ĐĂNG NHẬP -->
        <div id="loginPage" class="glass-card p-8 w-full max-w-md mt-10 text-center">
            <h2 class="text-3xl font-black mb-6 azota-purple uppercase">GAYZOTA</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-purple-200">
                <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-purple-200">
                <button onclick="handleLogin()" class="w-full bg-azota text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform">ĐĂNG NHẬP</button>
            </div>
        </div>

        <!-- MENU CHÍNH -->
        <div id="mainMenu" class="glass-card p-8 w-full max-w-2xl hidden mt-6">
            <h2 class="text-xl font-bold mb-6 azota-purple border-b pb-2 text-center uppercase">Bảng Điều Khiển</h2>
            <div class="grid grid-cols-1 gap-4">
                <button id="adminOnlyBtn" onclick="showSection('adminPage')" class="hidden p-5 border-2 border-violet-100 rounded-2xl hover:bg-violet-50 text-left font-bold italic text-violet-600">📝 Quản lý đề (PC Only)</button>
                <button onclick="showSection('selectExamPage')" class="p-5 border-2 border-violet-100 rounded-2xl hover:bg-violet-50 text-left font-bold uppercase text-gray-700">✍️ Vào thi</button>
                <button onclick="showSection('resultBoard')" class="p-5 border-2 border-violet-100 rounded-2xl hover:bg-violet-50 text-left font-bold uppercase text-gray-700">📊 Lịch sử & GPS</button>
            </div>
        </div>

        <!-- QUẢN LÝ ĐỀ (Giao diện phụ để copy code) -->
        <div id="adminPage" class="glass-card p-8 w-full max-w-4xl hidden mt-4">
            <button onclick="showSection('mainMenu')" class="mb-4 text-violet-600 font-bold text-sm underline">← Quay lại Menu</button>
            <h3 class="font-bold mb-2 text-gray-600 uppercase">Hướng dẫn hiện đề lên điện thoại</h3>
            <p class="text-sm text-red-500 mb-4 font-medium italic">BƯỚC 1: Soạn đề dưới đây. BƯỚC 2: Copy đề. BƯỚC 3: Dán vào GitHub chỗ 'sampleExams'.</p>
            <textarea id="rawInput" class="w-full h-48 p-3 rounded-xl border mb-4 focus:ring-2 focus:ring-violet-200 outline-none" placeholder="Câu 1. 1+1 bằng? A. 1 B. 2 @t"></textarea>
        </div>

        <!-- CHỌN ĐỀ -->
        <div id="selectExamPage" class="glass-card p-8 w-full max-w-2xl hidden mt-4">
             <button onclick="showSection('mainMenu')" class="mb-4 text-violet-600 font-bold text-sm underline">← Quay lại</button>
             <div id="userExamList" class="grid grid-cols-1 gap-4"></div>
        </div>

        <!-- LÀM BÀI -->
        <div id="examPage" class="glass-card p-8 w-full max-w-2xl hidden">
            <div class="flex justify-between mb-6 border-b pb-4">
                <div id="qNum" class="azota-purple font-bold"></div>
                <div id="timerDisplay" class="text-red-500 font-mono font-bold">15:00</div>
            </div>
            <h3 id="qText" class="text-xl mb-8 font-semibold text-gray-800"></h3>
            <div id="optionsGroup" class="space-y-3"></div>
            <button id="nextBtn" onclick="nextQuestion()" class="mt-8 w-full bg-azota text-white py-4 rounded-xl font-bold hidden uppercase">Tiếp theo</button>
        </div>

        <!-- KẾT QUẢ -->
        <div id="resultPage" class="glass-card p-10 text-center hidden mt-10 w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Kết quả của bạn</h2>
            <div class="text-8xl font-black azota-purple mb-4" id="finalScore">0</div>
            <p id="gpsNote" class="text-xs text-gray-400 mb-6 italic">Đang ghi nhận vị trí GPS...</p>
            <button onclick="showReview()" class="w-full bg-[#f3e8ff] text-violet-700 font-bold py-4 rounded-2xl mb-4">XEM CHI TIẾT ĐÁP ÁN</button>
            <button onclick="showSection('mainMenu')" class="w-full bg-azota text-white font-bold py-4 rounded-2xl">QUAY LẠI MENU</button>
        </div>

        <!-- LỊCH SỬ & GPS -->
        <div id="resultBoard" class="glass-card p-8 w-full max-w-3xl hidden mt-4">
            <button onclick="showSection('mainMenu')" class="mb-4 text-violet-600 font-bold text-sm underline">← Quay lại</button>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="text-gray-400 border-b uppercase text-xs">
                        <tr><th class="p-2">Tên</th><th class="p-2">Điểm</th><th class="p-2">GPS</th></tr>
                    </thead>
                    <tbody id="resultTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- XEM LẠI -->
        <div id="reviewPage" class="glass-card p-8 w-full max-w-3xl hidden mt-4">
            <div id="reviewContainer" class="space-y-6"></div>
            <button onclick="showSection('resultPage')" class="mt-10 w-full bg-gray-800 text-white py-4 rounded-xl font-bold">QUAY LẠI</button>
        </div>
    </main>

    <script>
        const USERS = { 'mrduc': { pass: 'admin8a7', role: 'admin' }, 'hoanggay': { pass: 'missgay', role: 'user' } };

        // ==========================================
        // CHỖ NÀY ĐỂ SỬA ĐỀ (DÁN VÀO ĐÂY ĐỂ HIỆN TRÊN ĐT)
        // ==========================================
        const sampleExams = [
            {
                id: 101,
                title: "ĐỀ KIỂM TRA TOÁN 15 PHÚT",
                questions: [
                    { 
                        q: "Căn bậc hai của 16 là?", 
                        opts: [{text:"4",correct:true}, {text:"8",correct:false}, {text:"16",correct:false}] 
                    },
                    { 
                        q: "Hoàng có gay không?", 
                        opts: [{text:"Có",correct:true}, {text:"Rất gay",correct:true}, {text:"Không",correct:false}] 
                    }
                ]
            }
        ];
        // ==========================================

        let history = JSON.parse(localStorage.getItem('quizHistory')) || [];
        let state = { user: '', currentExam: null, idx: 0, correctCount: 0, userAnswers: [], shuffledOptions: [], timer: null, timeLeft: 900, latLon: "Chưa lấy" };

        function showSection(id) {
            ['loginPage', 'mainMenu', 'adminPage', 'selectExamPage', 'examPage', 'resultPage', 'resultBoard', 'reviewPage'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'selectExamPage') renderUserExams();
            if(id === 'resultBoard') showResultBoardContent();
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if (USERS[u] && USERS[u].pass === p) {
                state.user = u;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('navbar').classList.remove('hidden');
                if (USERS[u].role === 'admin') document.getElementById('adminOnlyBtn').classList.remove('hidden');
                showSection('mainMenu');
                // Xin quyền GPS ngay khi vào
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        state.latLon = `${pos.coords.latitude.toFixed(4)},${pos.coords.longitude.toFixed(4)}`;
                    });
                }
            } else { alert("Sai tài khoản!"); }
        }

        function renderUserExams() {
            document.getElementById('userExamList').innerHTML = sampleExams.map(ex => `<button onclick="state.currentExam=sampleExams.find(e=>e.id==${ex.id});startExam()" class="p-6 border-2 border-violet-100 rounded-3xl font-bold text-violet-700 uppercase active:scale-95 transition-all">${ex.title}</button>`).join('');
        }

        function startExam() {
            showSection('examPage');
            state.idx = 0; state.correctCount = 0; state.userAnswers = []; state.shuffledOptions = []; state.timeLeft = 900;
            showQ();
            if(state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.timeLeft--;
                const m = Math.floor(state.timeLeft/60), s = state.timeLeft%60;
                document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0'+s:s}`;
                if(state.timeLeft <= 0) finishExam();
            }, 1000);
        }

        function showQ() {
            const q = state.currentExam.questions[state.idx];
            document.getElementById('qNum').innerText = `CÂU ${state.idx + 1}/${state.currentExam.questions.length}`;
            document.getElementById('qText').innerText = q.q;
            document.getElementById('nextBtn').classList.add('hidden');
            const group = document.getElementById('optionsGroup'); group.innerHTML = '';
            const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
            state.shuffledOptions.push(shuffled);
            shuffled.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-4 border-2 border-gray-100 rounded-2xl font-medium";
                b.innerText = o.text;
                b.onclick = () => {
                    if (!document.getElementById('nextBtn').classList.contains('hidden')) return;
                    state.userAnswers.push(i);
                    if (o.correct) { b.classList.add('bg-green-500', 'text-white'); state.correctCount++; }
                    else b.classList.add('bg-red-500', 'text-white');
                    document.getElementById('nextBtn').classList.remove('hidden');
                };
                group.appendChild(b);
            });
        }

        function nextQuestion() { state.idx++; if (state.idx < state.currentExam.questions.length) showQ(); else finishExam(); }

        function finishExam() {
            clearInterval(state.timer);
            const score = Math.round((state.correctCount / state.currentExam.questions.length) * 10 * 100) / 100;
            
            // Lưu vào lịch sử máy
            history.unshift({ name: state.user, score, gps: state.latLon, exam: state.currentExam.title });
            localStorage.setItem('quizHistory', JSON.stringify(history));
            
            showSection('resultPage');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gpsNote').innerText = "GPS ghi nhận: " + state.latLon;
        }

        function showReview() {
            showSection('reviewPage');
            document.getElementById('reviewContainer').innerHTML = state.currentExam.questions.map((q, i) => {
                const userIdx = state.userAnswers[i], opts = state.shuffledOptions[i];
                return `<div class="p-5 border rounded-2xl bg-white mb-4"><div class="font-bold mb-3">Câu ${i+1}: ${q.q}</div>
                    ${opts.map((o, oi) => `<div class="review-opt ${oi===userIdx?(o.correct?'review-correct':'review-wrong'):''}">${o.text} ${o.correct ? '✓' : ''}</div>`).join('')}</div>`;
            }).join('');
        }

        function showResultBoardContent() {
            document.getElementById('resultTableBody').innerHTML = history.map(h => `<tr class="border-b"><td class="p-3 font-bold">${h.name}</td><td class="p-3 text-violet-600 font-bold">${h.score}</td><td class="p-3 text-gray-400 text-xs">${h.gps}</td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center text-gray-400 italic">Trống</td></tr>';
        }
    </script>
</body>
</html>
